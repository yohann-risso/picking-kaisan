<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <title>Plaquinhas | Picking Kaisan</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <style>
      :root {
        --azul-principal: #1c3f60;
        --azul-secundario: #d9e9f2;
        --azul-borda: #c6dbe8;
        --texto: #1a1d20;
        --texto-suave: #66707a;
        --borda: #d8e0e7;
        --borda-suave: #e8edf2;
        --bg: #f8f9fa;
        --white: #ffffff;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        background: var(--bg);
        font-family: Arial, Helvetica, sans-serif;
        color: var(--texto);
      }

      .status {
        display: inline-flex;
        align-items: center;
        gap: 10px;
        padding: 12px 18px;
        border-radius: 12px;
        background: #fff;
        border: 1px solid var(--borda);
        box-shadow: 0 8px 24px rgba(28, 63, 96, 0.08);
        font-size: 14px;
        color: var(--texto-suave);
      }

      .status::before {
        content: "";
        width: 10px;
        height: 10px;
        border-radius: 999px;
        background: var(--azul-principal);
        animation: pulse 1.3s infinite;
      }

      @keyframes pulse {
        0% {
          transform: scale(1);
          opacity: 1;
        }
        70% {
          transform: scale(1.5);
          opacity: 0.25;
        }
        100% {
          transform: scale(1);
          opacity: 1;
        }
      }
    </style>
  </head>
  <body>
    <div class="status">Gerando plaquinhas para impressão...</div>

    <script type="module">
      import { createClient } from "https://cdn.jsdelivr.net/npm/@supabase/supabase-js/+esm";

      const { jsPDF } = window.jspdf;

      const SUPABASE_URL = "https://kinpwzuobsmfkjefnrdc.supabase.co";
      const SUPABASE_KEY =
        "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImtpbnB3enVvYnNtZmtqZWZucmRjIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NDc5OTgwMjcsImV4cCI6MjA2MzU3NDAyN30.btmwaLMSnXCmvKHQvYnw7ZngONqoejqnhbvazLhD1Io";

      const supabase = createClient(SUPABASE_URL, SUPABASE_KEY);

      const urlParams = new URLSearchParams(location.search);
      const grupo = urlParams.get("grupo");
      const operador = urlParams.get("operador") || "";

      if (!grupo) {
        alert("Grupo não informado.");
        throw new Error("Grupo ausente.");
      }

      function normalizarCaixa(v) {
        return String(v || "")
          .trim()
          .toUpperCase();
      }

      function formatarTexto(valor, fallback = "-") {
        const v = String(valor ?? "").trim();
        return v || fallback;
      }

      function desenharRoundedRect(doc, x, y, w, h, r = 3, style = "S") {
        doc.roundedRect(x, y, w, h, r, r, style);
      }

      function escreverCentro(doc, texto, x, y, options = {}) {
        doc.text(String(texto ?? ""), x, y, { align: "center", ...options });
      }

      function carregarImagem(url) {
        return new Promise((resolve, reject) => {
          const img = new Image();
          img.crossOrigin = "Anonymous";
          img.onload = () => resolve(img);
          img.onerror = reject;
          img.src = url;
        });
      }

      function imageToBase64(img) {
        const canvas = document.createElement("canvas");
        canvas.width = img.naturalWidth;
        canvas.height = img.naturalHeight;
        const ctx = canvas.getContext("2d");
        ctx.drawImage(img, 0, 0);
        return canvas.toDataURL("image/png");
      }

      function desenharPlaquinha(
        doc,
        rom,
        pos,
        grupoNum,
        operadorNome,
        logoBase64 = null,
      ) {
        const { x, y } = pos;

        const largura = 90;
        const altura = 128;
        const dataHoje = new Date().toLocaleDateString("pt-BR");
        const caixa = normalizarCaixa(rom.caixa);

        const colors = {
          azul: [28, 63, 96],
          azulEscuro: [46, 46, 46],
          azulClaro: [217, 233, 242],
          azulBorda: [198, 219, 232],
          texto: [26, 29, 32],
          textoSuave: [102, 112, 122],
          borda: [198, 198, 198],
          bordaForte: [142, 142, 142],
          bordaSuave: [230, 230, 230],
          white: [255, 255, 255],
          cinzaBox: [246, 246, 246],
          cinzaHeader: [243, 243, 243],
          cinzaSection: [232, 232, 232],
        };

        // ========= CARD EXTERNO =========
        doc.setFillColor(...colors.white);
        doc.setDrawColor(...colors.bordaForte);
        doc.setLineWidth(0.55);
        desenharRoundedRect(doc, x, y, largura, altura, 3.2, "FD");

        // ========= BORDA INTERNA SUAVE =========
        doc.setDrawColor(...colors.bordaSuave);
        doc.setLineWidth(0.2);
        desenharRoundedRect(
          doc,
          x + 1.4,
          y + 1.4,
          largura - 2.8,
          altura - 2.8,
          2.6,
          "S",
        );

        // ========= TOPBAR =========
        doc.setFillColor(...colors.azulEscuro);
        desenharRoundedRect(doc, x, y, largura, 5, 3.2, "F");
        doc.rect(x, y + 2.5, largura, 2.5, "F");

        // ========= LOGO =========
        if (logoBase64) {
          try {
            doc.addImage(logoBase64, "PNG", x + 5, y + 8, 26, 8);
          } catch (e) {
            console.warn("Erro ao desenhar logo:", e);
          }
        }

        // ========= HEADER GRUPO / CAIXA =========
        const headerY = y + 8;
        const boxW = 18;
        const boxH = 11;
        const gap = 4;
        const totalW = boxW * 2 + gap;
        const startX = x + largura - 5 - totalW;

        // Grupo
        doc.setFillColor(...colors.cinzaHeader);
        doc.setDrawColor(...colors.borda);
        doc.setLineWidth(0.25);
        desenharRoundedRect(doc, startX, headerY, boxW, boxH, 2.2, "FD");

        doc.setFont("helvetica", "bold");
        doc.setTextColor(...colors.azul);
        doc.setFontSize(5.4);
        escreverCentro(doc, "GRUPO", startX + boxW / 2, headerY + 4);

        doc.setFontSize(10.2);
        doc.setTextColor(...colors.texto);
        escreverCentro(doc, grupoNum, startX + boxW / 2, headerY + 8.8);

        // Caixa
        const caixaX = startX + boxW + gap;
        doc.setFillColor(...colors.cinzaHeader);
        doc.setDrawColor(...colors.borda);
        desenharRoundedRect(doc, caixaX, headerY, boxW, boxH, 2.2, "FD");

        doc.setFont("helvetica", "bold");
        doc.setTextColor(...colors.azul);
        doc.setFontSize(5.4);
        escreverCentro(doc, "CAIXA", caixaX + boxW / 2, headerY + 4);

        doc.setFillColor(...colors.azulEscuro);
        desenharRoundedRect(
          doc,
          caixaX + 3.2,
          headerY + 4.7,
          boxW - 6.4,
          5.2,
          1.6,
          "F",
        );

        doc.setTextColor(255, 255, 255);
        doc.setFontSize(9.8);
        escreverCentro(doc, caixa || "-", caixaX + boxW / 2, headerY + 8.75);

        // ========= ROMANEIO =========
        const romY = y + 23;
        doc.setFillColor(...colors.azulEscuro);
        doc.setDrawColor(...colors.azulEscuro);
        desenharRoundedRect(doc, x + 5, romY, largura - 10, 19, 3, "FD");

        doc.setFont("helvetica", "bold");
        doc.setTextColor(255, 255, 255);
        doc.setFontSize(6.6);
        escreverCentro(doc, "ROMANEIO", x + largura / 2, romY + 6.2);

        doc.setFontSize(21);
        escreverCentro(
          doc,
          formatarTexto(rom.romaneio),
          x + largura / 2,
          romY + 15.3,
        );

        // ========= BLOCO DE DADOS =========
        const metaY = romY + 24;
        const metaH = 25.5;

        doc.setFillColor(...colors.white);
        doc.setDrawColor(...colors.borda);
        doc.setLineWidth(0.25);
        desenharRoundedRect(doc, x + 5, metaY, largura - 10, metaH, 2.4, "FD");

        // Faixa interna sutil
        doc.setFillColor(...colors.cinzaBox);
        desenharRoundedRect(
          doc,
          x + 6.2,
          metaY + 1.6,
          largura - 12.4,
          metaH - 3.2,
          1.8,
          "F",
        );

        const labelX = x + 8;
        const valorX = x + largura - 8;
        let lineY = metaY + 5.9;

        const linhas = [
          ["Data", dataHoje],
          ["Qtd. Pedidos", formatarTexto(rom.qtd_pedidos)],
          ["Qtd. Peças", formatarTexto(rom.qtd_pecas)],
          ["Operador", operadorNome || ""],
        ];

        linhas.forEach(([label, value], index) => {
          doc.setFont("helvetica", "bold");
          doc.setTextColor(...colors.texto);
          doc.setFontSize(7.1);
          doc.text(`${label}:`, labelX, lineY);

          if (label === "Operador") {
            doc.setDrawColor(150, 150, 150);
            doc.setLineWidth(0.22);
            doc.line(x + 54, lineY - 0.6, x + largura - 8, lineY - 0.6);
          } else {
            doc.setFont("helvetica", "bold");
            doc.setTextColor(...colors.textoSuave);
            doc.text(String(value), valorX, lineY, { align: "right" });
          }

          lineY += index === linhas.length - 1 ? 5.7 : 5.9;
        });

        // ========= TÍTULO CONFERÊNCIA =========
        const confTitleY = metaY + metaH + 5.2;
        doc.setFillColor(...colors.cinzaSection);
        doc.setDrawColor(...colors.borda);
        doc.setLineWidth(0.25);
        desenharRoundedRect(doc, x + 5, confTitleY, largura - 10, 8, 2.4, "FD");

        doc.setFont("helvetica", "bold");
        doc.setFontSize(6.9);
        doc.setTextColor(...colors.azulEscuro);
        escreverCentro(
          doc,
          "CONTROLE DE CONFERÊNCIA",
          x + largura / 2,
          confTitleY + 5.2,
        );

        // ========= CONFERENTE =========
        const conferenteY = confTitleY + 12.2;
        doc.setFont("helvetica", "bold");
        doc.setFontSize(7.1);
        doc.setTextColor(...colors.texto);
        doc.text("Conferente:", x + 6, conferenteY);

        doc.setDrawColor(125, 125, 125);
        doc.setLineWidth(0.22);
        doc.line(x + 23, conferenteY - 0.5, x + largura - 6, conferenteY - 0.5);

        // ========= TABELA =========
        const tableY = conferenteY + 4.6;
        const tableX = x + 5;
        const tableW = largura - 10;
        const headerH = 6.5;
        const rowH = 11;
        const colDesc = 60;
        const colQtd = tableW - colDesc;

        // Header
        doc.setFillColor(...colors.azulEscuro);
        doc.setDrawColor(...colors.azulEscuro);
        doc.rect(tableX, tableY, tableW, headerH, "FD");

        doc.setFont("helvetica", "bold");
        doc.setTextColor(255, 255, 255);
        doc.setFontSize(6.7);
        doc.text("DESC. ERRO", tableX + 3, tableY + 4.2);
        escreverCentro(
          doc,
          "QTD.",
          tableX + colDesc + colQtd / 2,
          tableY + 4.2,
        );

        // Linhas
        const erros = ["Sobra", "Falta", "Outros"];
        let rowY = tableY + headerH;

        erros.forEach((erro, idx) => {
          doc.setFillColor(255, 255, 255);
          doc.setDrawColor(...colors.borda);
          doc.setLineWidth(0.2);
          doc.rect(tableX, rowY, tableW, rowH, "FD");
          doc.line(tableX + colDesc, rowY, tableX + colDesc, rowY + rowH);

          // zebra leve
          if (idx % 2 === 0) {
            doc.setFillColor(250, 250, 250);
            doc.rect(tableX + 0.2, rowY + 0.2, tableW - 0.4, rowH - 0.4, "F");
            doc.setDrawColor(...colors.borda);
            doc.rect(tableX, rowY, tableW, rowH, "S");
            doc.line(tableX + colDesc, rowY, tableX + colDesc, rowY + rowH);
          }

          doc.setFont("helvetica", "normal");
          doc.setTextColor(...colors.texto);
          doc.setFontSize(7.9);
          doc.text(erro, tableX + 3, rowY + 6.8);

          rowY += rowH;
        });
      }

      function desenharPaginasPlaquinhas(
        doc,
        dados,
        grupoNum,
        operadorNome,
        logoBase64 = null,
      ) {
        if (!Array.isArray(dados) || dados.length === 0) {
          throw new Error("Nenhum romaneio válido para desenhar.");
        }

        const largura = 90;
        const altura = 128;
        const margemX = 10;
        const margemY = 10;
        const gapX = 11;
        const gapY = 11;

        const posicoes = [
          { x: margemX, y: margemY },
          { x: margemX + largura + gapX, y: margemY },
          { x: margemX, y: margemY + altura + gapY },
          { x: margemX + largura + gapX, y: margemY + altura + gapY },
        ];

        dados.forEach((rom, index) => {
          const slot = index % 4;

          if (index > 0 && slot === 0) {
            doc.addPage("a4", "portrait");
          }

          desenharPlaquinha(
            doc,
            rom,
            posicoes[slot],
            grupoNum,
            operadorNome,
            logoBase64,
          );
        });
      }

      async function gerarPDF(grupoParam) {
        try {
          const grupoNum = Number(grupoParam);

          const { data, error } = await supabase
            .from("romaneios")
            .select("romaneio, qtd_pedidos, qtd_pecas, caixa")
            .eq("conjunto", String(grupoNum))
            .order("caixa", { ascending: true });

          console.log("grupo recebido:", grupoNum);
          console.log("romaneios retornados:", data);
          console.log("erro supabase:", error);

          if (error) {
            throw new Error(`Erro Supabase: ${error.message}`);
          }

          if (!Array.isArray(data) || data.length === 0) {
            throw new Error(
              `Nenhum romaneio encontrado para o grupo ${grupoNum}.`,
            );
          }

          const doc = new jsPDF({
            orientation: "portrait",
            unit: "mm",
            format: "a4",
          });

          let logoBase64 = null;

          try {
            const logo = await carregarImagem(
              "https://www.kaisan.com.br/skin/frontend/base/default/images/logo/2025.png",
            );
            logoBase64 = imageToBase64(logo);
          } catch (e) {
            console.warn("Não foi possível carregar a logo.");
          }

          desenharPaginasPlaquinhas(doc, data, grupoNum, operador, logoBase64);

          const blob = doc.output("blob");
          const url = URL.createObjectURL(
            new Blob([blob], { type: "application/pdf" }),
          );

          const iframe = document.createElement("iframe");
          iframe.style.display = "none";
          iframe.src = url;
          document.body.appendChild(iframe);

          iframe.onload = () => {
            setTimeout(() => {
              iframe.contentWindow.focus();
              iframe.contentWindow.print();
            }, 500);
          };
        } catch (err) {
          console.error("❌ Erro ao gerar PDF:", err);
          alert("Erro ao gerar PDF: " + err.message);
        }
      }

      gerarPDF(grupo);
    </script>
  </body>
</html>
