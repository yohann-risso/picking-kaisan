<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <title>Plaquinhas | Picking Kaisan</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <style>
      :root {
        --azul-principal: #1c3f60;
        --azul-secundario: #d9e9f2;
        --azul-borda: #c6dbe8;
        --texto: #1a1d20;
        --texto-suave: #66707a;
        --borda: #d8e0e7;
        --borda-suave: #e8edf2;
        --bg: #f8f9fa;
        --white: #ffffff;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        background: var(--bg);
        font-family: Arial, Helvetica, sans-serif;
        color: var(--texto);
      }

      .status {
        display: inline-flex;
        align-items: center;
        gap: 10px;
        padding: 12px 18px;
        border-radius: 12px;
        background: #fff;
        border: 1px solid var(--borda);
        box-shadow: 0 8px 24px rgba(28, 63, 96, 0.08);
        font-size: 14px;
        color: var(--texto-suave);
      }

      .status::before {
        content: "";
        width: 10px;
        height: 10px;
        border-radius: 999px;
        background: var(--azul-principal);
        animation: pulse 1.3s infinite;
      }

      @keyframes pulse {
        0% {
          transform: scale(1);
          opacity: 1;
        }
        70% {
          transform: scale(1.5);
          opacity: 0.25;
        }
        100% {
          transform: scale(1);
          opacity: 1;
        }
      }
    </style>
  </head>
  <body>
    <div class="status">Gerando plaquinhas para impressão...</div>

    <script type="module">
      import { createClient } from "https://cdn.jsdelivr.net/npm/@supabase/supabase-js/+esm";

      const { jsPDF } = window.jspdf;

      const SUPABASE_URL = "https://kinpwzuobsmfkjefnrdc.supabase.co";
      const SUPABASE_KEY =
        "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImtpbnB3enVvYnNtZmtqZWZucmRjIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NDc5OTgwMjcsImV4cCI6MjA2MzU3NDAyN30.btmwaLMSnXCmvKHQvYnw7ZngONqoejqnhbvazLhD1Io";

      const supabase = createClient(SUPABASE_URL, SUPABASE_KEY);

      const urlParams = new URLSearchParams(location.search);
      const grupo = urlParams.get("grupo");
      const operador = urlParams.get("operador") || "";

      if (!grupo) {
        alert("Grupo não informado.");
        throw new Error("Grupo ausente.");
      }

      function normalizarCaixa(v) {
        return String(v || "")
          .trim()
          .toUpperCase();
      }

      function formatarTexto(valor, fallback = "-") {
        const v = String(valor ?? "").trim();
        return v || fallback;
      }

      function desenharRoundedRect(doc, x, y, w, h, r = 3, style = "S") {
        doc.roundedRect(x, y, w, h, r, r, style);
      }

      function escreverCentro(doc, texto, x, y, options = {}) {
        doc.text(String(texto ?? ""), x, y, { align: "center", ...options });
      }

      function desenharPlaquinha(doc, rom, pos, grupoNum, operadorNome) {
        const { x, y } = pos;

        const largura = 90;
        const altura = 128;
        const dataHoje = new Date().toLocaleDateString("pt-BR");
        const caixa = normalizarCaixa(rom.caixa);

        const colors = {
          azul: [28, 63, 96],
          azulClaro: [217, 233, 242],
          azulBorda: [198, 219, 232],
          texto: [26, 29, 32],
          textoSuave: [102, 112, 122],
          borda: [216, 224, 231],
          bordaSuave: [232, 237, 242],
          white: [255, 255, 255],
          cinzaBox: [243, 246, 248],
          cinzaHeader: [245, 247, 249],
        };

        // CARD BASE
        doc.setDrawColor(...colors.borda);
        doc.setLineWidth(0.35);
        doc.setFillColor(...colors.white);
        desenharRoundedRect(doc, x, y, largura, altura, 3, "FD");

        // TOPBAR
        doc.setFillColor(...colors.azul);
        desenharRoundedRect(doc, x, y, largura, 5, 3, "F");
        doc.rect(x, y + 2.5, largura, 2.5, "F");

        // HEADER COM GRUPO E CAIXA
        const headerY = y + 8;
        const cardSmallW = 18;
        const cardSmallH = 12;
        const gap = 4;
        const totalSmall = cardSmallW * 2 + gap;

        const startX = x + largura - 5 - totalSmall;

        doc.setFillColor(...colors.cinzaHeader);
        doc.setDrawColor(...colors.borda);
        desenharRoundedRect(
          doc,
          startX,
          headerY,
          cardSmallW,
          cardSmallH,
          2.2,
          "FD",
        );
        desenharRoundedRect(
          doc,
          startX + cardSmallW + gap,
          headerY,
          cardSmallW,
          cardSmallH,
          2.2,
          "FD",
        );

        doc.setFont("helvetica", "bold");
        doc.setTextColor(...colors.azul);
        doc.setFontSize(5.8);
        escreverCentro(doc, "GRUPO", startX + cardSmallW / 2, headerY + 4.2);
        escreverCentro(
          doc,
          "CAIXA",
          startX + cardSmallW + gap + cardSmallW / 2,
          headerY + 4.2,
        );

        doc.setFontSize(10.5);
        escreverCentro(doc, grupoNum, startX + cardSmallW / 2, headerY + 9.5);

        doc.setFillColor(...colors.azul);
        desenharRoundedRect(
          doc,
          startX + cardSmallW + gap + 3.3,
          headerY + 4.8,
          cardSmallW - 6.6,
          5.4,
          1.6,
          "F",
        );
        doc.setTextColor(255, 255, 255);
        doc.setFontSize(9.6);
        escreverCentro(
          doc,
          caixa || "-",
          startX + cardSmallW + gap + cardSmallW / 2,
          headerY + 9.05,
        );

        // BLOCO ROMANEIO
        const romY = y + 23;
        doc.setFillColor(...colors.azul);
        doc.setDrawColor(...colors.azul);
        desenharRoundedRect(doc, x + 5, romY, largura - 10, 19, 3, "FD");

        doc.setFont("helvetica", "bold");
        doc.setTextColor(255, 255, 255);
        doc.setFontSize(7);
        escreverCentro(doc, "ROMANEIO", x + largura / 2, romY + 6.2);

        doc.setFontSize(21);
        escreverCentro(
          doc,
          formatarTexto(rom.romaneio),
          x + largura / 2,
          romY + 15.2,
        );

        // META OPERACIONAL
        const metaY = romY + 24;
        const metaH = 25;

        doc.setDrawColor(...colors.bordaSuave);
        doc.setFillColor(...colors.white);
        desenharRoundedRect(doc, x + 5, metaY, largura - 10, metaH, 2.5, "FD");

        const labelX = x + 8;
        const valorX = x + largura - 8;
        let lineY = metaY + 5.7;

        const linhas = [
          ["Data", dataHoje],
          ["Qtd. Pedidos", formatarTexto(rom.qtd_pedidos)],
          ["Qtd. Peças", formatarTexto(rom.qtd_pecas)],
          ["Operador", operadorNome || "________________"],
        ];

        linhas.forEach(([label, value], index) => {
          doc.setFont("helvetica", "bold");
          doc.setTextColor(...colors.texto);
          doc.setFontSize(7.2);
          doc.text(`${label}:`, labelX, lineY);

          if (label === "Operador") {
            doc.setDrawColor(...colors.textoSuave);
            doc.setLineWidth(0.2);
            const startLine = x + 54;
            const endLine = x + largura - 7;
            doc.line(startLine, lineY - 0.7, endLine, lineY - 0.7);
          } else {
            doc.setFont("helvetica", "normal");
            doc.setTextColor(...colors.textoSuave);
            doc.text(String(value), valorX, lineY, { align: "right" });
          }

          lineY += index === linhas.length - 1 ? 5.5 : 5.8;
        });

        // TÍTULO CONFERÊNCIA
        const confTitleY = metaY + metaH + 5;
        doc.setFillColor(...colors.azulClaro);
        doc.setDrawColor(...colors.azulBorda);
        desenharRoundedRect(doc, x + 5, confTitleY, largura - 10, 8, 2.5, "FD");

        doc.setFont("helvetica", "bold");
        doc.setFontSize(7);
        doc.setTextColor(...colors.azul);
        escreverCentro(
          doc,
          "CONTROLE DE CONFERÊNCIA",
          x + largura / 2,
          confTitleY + 5.3,
        );

        // CONFERENTE
        const conferenteY = confTitleY + 12;
        doc.setFont("helvetica", "bold");
        doc.setFontSize(7.3);
        doc.setTextColor(...colors.texto);
        doc.text("Conferente:", x + 6, conferenteY);

        doc.setDrawColor(...colors.textoSuave);
        doc.setLineWidth(0.22);
        doc.line(x + 23, conferenteY - 0.5, x + largura - 6, conferenteY - 0.5);

        // HEADER TABELA
        const tableY = conferenteY + 4.5;
        const tableX = x + 5;
        const tableW = largura - 10;
        const colDesc = 60;
        const colQtd = tableW - colDesc;

        doc.setFillColor(...colors.azul);
        doc.setDrawColor(...colors.azul);
        doc.rect(tableX, tableY, tableW, 6.5, "FD");

        doc.setFont("helvetica", "bold");
        doc.setTextColor(255, 255, 255);
        doc.setFontSize(6.8);
        doc.text("DESC. ERRO", tableX + 3, tableY + 4.35);
        escreverCentro(
          doc,
          "QTD.",
          tableX + colDesc + colQtd / 2,
          tableY + 4.35,
        );

        // LINHAS DE ERRO
        const erros = ["Sobra", "Falta", "Outros"];
        let rowY = tableY + 6.5;

        erros.forEach((erro) => {
          doc.setDrawColor(...colors.bordaSuave);
          doc.setFillColor(...colors.white);
          doc.rect(tableX, rowY, tableW, 11, "FD");
          doc.line(tableX + colDesc, rowY, tableX + colDesc, rowY + 11);

          doc.setFont("helvetica", "normal");
          doc.setTextColor(...colors.texto);
          doc.setFontSize(8);
          doc.text(erro, tableX + 3, rowY + 6.8);

          rowY += 11;
        });
      }

      function desenharPaginasPlaquinhas(doc, dados, grupoNum, operadorNome) {
        if (!Array.isArray(dados) || dados.length === 0) {
          throw new Error("Nenhum romaneio válido para desenhar.");
        }

        const largura = 90;
        const altura = 128;
        const margemX = 10;
        const margemY = 10;
        const gapX = 10;
        const gapY = 10;

        const posicoes = [
          { x: margemX, y: margemY },
          { x: margemX + largura + gapX, y: margemY },
          { x: margemX, y: margemY + altura + gapY },
          { x: margemX + largura + gapX, y: margemY + altura + gapY },
        ];

        dados.forEach((rom, index) => {
          const slot = index % 4;

          if (index > 0 && slot === 0) {
            doc.addPage("a4", "portrait");
          }

          desenharPlaquinha(doc, rom, posicoes[slot], grupoNum, operadorNome);
        });
      }

      async function gerarPDF(grupoParam) {
        try {
          const grupoNum = Number(grupoParam);

          const { data, error } = await supabase
            .from("romaneios")
            .select("romaneio, qtd_pedidos, qtd_pecas, caixa")
            .eq("conjunto", String(grupoNum))
            .order("caixa", { ascending: true });

          console.log("grupo recebido:", grupoNum);
          console.log("romaneios retornados:", data);
          console.log("erro supabase:", error);

          if (error) {
            throw new Error(`Erro Supabase: ${error.message}`);
          }

          if (!Array.isArray(data) || data.length === 0) {
            throw new Error(
              `Nenhum romaneio encontrado para o grupo ${grupoNum}.`,
            );
          }

          const doc = new jsPDF({
            orientation: "portrait",
            unit: "mm",
            format: "a4",
          });

          desenharPaginasPlaquinhas(doc, data, grupoNum, operador);

          const blob = doc.output("blob");
          const url = URL.createObjectURL(
            new Blob([blob], { type: "application/pdf" }),
          );

          const iframe = document.createElement("iframe");
          iframe.style.display = "none";
          iframe.src = url;
          document.body.appendChild(iframe);

          iframe.onload = () => {
            setTimeout(() => {
              iframe.contentWindow.focus();
              iframe.contentWindow.print();
            }, 500);
          };
        } catch (err) {
          console.error("❌ Erro ao gerar PDF:", err);
          alert("Erro ao gerar PDF: " + err.message);
        }
      }

      gerarPDF(grupo);
    </script>
  </body>
</html>
